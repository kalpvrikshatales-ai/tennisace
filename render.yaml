services:
  - type: web
    name: tennisace-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: TENNIS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    healthCheckPath: /health
