name: Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Lint and type-check on all commits
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npm run build 2>&1 | head -50

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Python syntax check
        run: cd backend && python -m py_compile app/**/*.py

  # Health check after push to main (Vercel/Render auto-deploy)
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Wait for auto-deployment
        run: sleep 30

      - name: Check backend health
        run: |
          curl -f https://tennisace-backend.onrender.com/health || exit 1

      - name: Check frontend availability
        run: |
          curl -f https://tennisace.live || exit 1
